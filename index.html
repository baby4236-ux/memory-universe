<style>
:root {
    --bg-core: #050018;
    --bg-deep: #02000a;
    --bg-void: #000000;
    --star-bright: #e0f7ff;
    --text: #d4faff;
    --text-dim: #7a9cb0;
    --header-h: 52px;
}
* { box-sizing: border-box; margin: 0; padding: 0;
    font-family: 'Inter', 'Segoe UI', 'Malgun Gothic', sans-serif;
    -webkit-tap-highlight-color: transparent; }
html, body {
    width: 100vw; height: 100vh; height: 100dvh; overflow: hidden;
    background: radial-gradient(ellipse at 50% 45%,
        #0a0430 0%,
        #050018 30%,
        #020008 60%,
        #000000 100%);
    color: var(--text);
}
/* Soft overlay clouds for depth */
body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
        radial-gradient(ellipse 70% 50% at 20% 30%, rgba(80, 20, 160, 0.18), transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(255, 20, 147, 0.12), transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 90%, rgba(0, 206, 209, 0.10), transparent 60%);
    mix-blend-mode: screen;
    animation: driftA 50s ease-in-out infinite alternate;
}
@keyframes driftA {
    0% { transform: translate(0, 0); }
    50% { transform: translate(2%, -1%); }
    100% { transform: translate(-1.5%, 1.5%); }
}

#graph-container {
    position: fixed; inset: 0; z-index: 1;
}
/* Header */
#header {
    position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    background: linear-gradient(180deg, rgba(5, 0, 24, 0.85), rgba(5, 0, 24, 0.3) 80%, transparent);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(180, 150, 255, 0.08);
}
#title {
    font-size: 15px; font-weight: 700; letter-spacing: 1.2px;
    background: linear-gradient(90deg, #c5b7ff, #7af0ff, #ffa5d9, #c5b7ff);
    background-size: 300% 100%;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 16px rgba(180, 150, 255, 0.35);
    animation: shimmer 8s ease-in-out infinite;
}
@keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

#search-wrap {
    position: relative; display: flex; align-items: center;
    margin: 0 14px;
}
#search-input {
    background: rgba(180, 150, 255, 0.08);
    border: 1px solid rgba(180, 150, 255, 0.25);
    border-radius: 16px;
    padding: 5px 12px 5px 30px;
    color: var(--text); font-size: 11px; outline: none;
    width: 160px; transition: all 0.2s;
    font-family: inherit;
}
#search-input:focus {
    background: rgba(180, 150, 255, 0.15);
    border-color: rgba(180, 150, 255, 0.6);
    width: 200px;
    box-shadow: 0 0 12px rgba(180, 150, 255, 0.3);
}
#search-input::placeholder { color: var(--text-dim); }
#search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 12px; color: var(--text-dim); pointer-events: none;
}
#search-results {
    position: absolute; top: 32px; left: 0; right: 0;
    background: rgba(10, 4, 40, 0.96);
    border: 1px solid rgba(180, 150, 255, 0.25);
    border-radius: 8px;
    max-height: 260px; overflow-y: auto;
    display: none; z-index: 200;
    backdrop-filter: blur(12px);
}
#search-results.show { display: block; }
.search-result-item {
    padding: 8px 12px; font-size: 11px; color: var(--text);
    cursor: pointer; border-bottom: 1px solid rgba(180, 150, 255, 0.06);
    transition: background 0.15s;
}
.search-result-item:hover { background: rgba(180, 150, 255, 0.15); }
.search-result-item .t-pill {
    display: inline-block; padding: 1px 6px; border-radius: 6px;
    font-size: 9px; letter-spacing: 0.6px; margin-right: 6px;
}
#subtitle { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
#stats {
    font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px;
}
#stats span { color: var(--star-bright); margin-left: 6px; }

/* Detail panel */
#detail-panel {
    position: fixed; top: var(--header-h); right: 0; bottom: 0;
    width: min(380px, 85vw); z-index: 50;
    background: linear-gradient(180deg, rgba(10, 4, 40, 0.92), rgba(5, 0, 24, 0.95));
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-left: 1px solid rgba(180, 150, 255, 0.2);
    transform: translateX(100%);
    transition: transform 0.35s ease;
    overflow-y: auto;
    padding: 24px 22px;
}
#detail-panel.open { transform: translateX(0); }
#close-btn {
    position: absolute; top: 14px; right: 16px;
    width: 28px; height: 28px; border: none; border-radius: 50%;
    background: rgba(180, 150, 255, 0.15);
    color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
#detail-title {
    font-size: 16px; font-weight: 700; margin-bottom: 6px;
    color: #eaf5ff;
    padding-right: 34px;
}
#detail-type {
    display: inline-block; padding: 3px 10px; border-radius: 10px;
    font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase;
    margin-bottom: 14px;
}
#detail-desc { font-size: 13px; line-height: 1.55; color: var(--text); margin-bottom: 16px; }
.detail-section { margin-bottom: 14px; }
.detail-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 4px; }
.detail-value { font-size: 12px; color: var(--text); }
.tag-pill {
    display: inline-block; padding: 2px 8px; font-size: 10px;
    border-radius: 8px; margin: 2px 3px 0 0;
    background: rgba(180, 150, 255, 0.12);
    color: #d0c5ff;
}

/* Filter bar */
#filter-bar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 40;
    display: flex; gap: 8px; padding: 8px 12px;
    background: rgba(10, 4, 40, 0.7);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 26px;
    border: 1px solid rgba(180, 150, 255, 0.18);
    max-width: 92vw; overflow-x: auto;
}
.filter-btn {
    padding: 6px 14px; border: 1px solid rgba(180, 150, 255, 0.25);
    border-radius: 18px; background: transparent;
    color: var(--text-dim); font-size: 11px; letter-spacing: 0.3px;
    cursor: pointer; white-space: nowrap;
    transition: all 0.2s ease;
}
.filter-btn.active, .filter-btn:hover {
    color: #fff;
    border-color: rgba(180, 150, 255, 0.6);
    background: rgba(180, 150, 255, 0.15);
    box-shadow: 0 0 12px rgba(180, 150, 255, 0.3);

/* Hint */
#hint {
    position: fixed; top: calc(var(--header-h) + 12px); left: 50%;
    transform: translateX(-50%);
    font-size: 10px; color: var(--text-dim); letter-spacing: 0.6px;
    z-index: 30; pointer-events: none;
    opacity: 0;
    animation: hintShow 5s ease-in-out forwards;
    animation-delay: 0.5s;
}
@keyframes hintShow {
    0% { opacity: 0; }
    15% { opacity: 0.8; }
    75% { opacity: 0.8; }
    100% { opacity: 0; }
}
</style>

/* === Palette by type (gradient colors) === */
const TYPE_PALETTE = {
    'moc':       { core: 0xffc966, glow: 0xff8040 },  /* 금빛 → 주황 */
    'project':   { core: 0x50e8c4, glow: 0x9040ff },  /* 청록 → 보라 */
    'user':      { core: 0x6a9dff, glow: 0x00e0ff },  /* 로얄블루 → 시안 */
    'feedback':  { core: 0xff7ab5, glow: 0xff4060 },  /* 코랄 → 핑크 */
    'reference': { core: 0x6ae3a0, glow: 0x20d080 },  /* 에메랄드 → 민트 */
    'note':      { core: 0xb8a0ff, glow: 0x8060ff },  /* 라벤더 */
    'default':   { core: 0xc0c0d8, glow: 0x8080a0 }
};
function typeColor(type) {
    return TYPE_PALETTE[type] || TYPE_PALETTE.default;
}
function hexToRGB(hex) {
    return [ ((hex>>16)&0xff)/255, ((hex>>8)&0xff)/255, (hex&0xff)/255 ];
}

/* === Node size by type + connection count (중요도 반영) === */
function nodeSize(node) {
    let base;
    if (node.type === 'moc') base = 8;
    else if (node.type === 'user') base = 5;
    else if (node.type === 'feedback') base = 4.5;
    else if (node.type === 'project') base = 5;
    else if (node.type === 'reference') base = 4;
    else base = 3;
    const conn = (node.indegree || 0) + (node.outdegree || 0);
    /* Scale up with connection count (최대 +60%) */
    const factor = 1 + Math.min(0.6, conn * 0.04);
    return base * factor;
}

/* Build quick lookup: node id → node */
const nodeById = new Map();
rawData.nodes.forEach(n => nodeById.set(n.id, n));

/* Build adjacency (for hover highlight) */
const neighbors = new Map();
rawData.nodes.forEach(n => neighbors.set(n.id, new Set()));
rawData.links.forEach(l => {
    const s = l.source.id || l.source;
    const t = l.target.id || l.target;
    if (neighbors.has(s)) neighbors.get(s).add(t);
    if (neighbors.has(t)) neighbors.get(t).add(s);
});

/* Mobile detection */
const IS_MOBILE = window.innerWidth < 768 || /Android|iPhone|iPad/i.test(navigator.userAgent);
const STAR_COUNT = IS_MOBILE ? 2500 : 6000;
const NEAR_COUNT = IS_MOBILE ? 150 : 400;
const LINK_PARTICLES = IS_MOBILE ? 1 : 2;

/* === Build graph === */
const container = document.getElementById('graph-container');
const Graph = ForceGraph3D()(container)
    .graphData(rawData)
    .backgroundColor('#000000')
    .nodeRelSize(1)
    .nodeThreeObject(node => {
        const pal = typeColor(node.type);
        const size = nodeSize(node);
        const geom = new THREE.SphereGeometry(size, 20, 20);
        const mat = new THREE.MeshStandardMaterial({
            color: pal.core,
            emissive: pal.glow,
            emissiveIntensity: 0.85,
            metalness: 0.35,
            roughness: 0.45,
            toneMapped: false
        });
        const mesh = new THREE.Mesh(geom, mat);

        /* Halo (larger translucent sphere) for glow effect (no postprocess needed) */
        const haloGeom = new THREE.SphereGeometry(size * 1.7, 16, 16);
        const haloMat = new THREE.MeshBasicMaterial({
            color: pal.glow,
            transparent: true,
            opacity: 0.18,
            side: THREE.BackSide,
            depthWrite: false
        });
        mesh.add(new THREE.Mesh(haloGeom, haloMat));

        /* Extra outer soft halo for MOC central nodes */
        if (node.type === 'moc') {
            const outerGeom = new THREE.SphereGeometry(size * 2.6, 16, 16);
            const outerMat = new THREE.MeshBasicMaterial({
                color: pal.core,
                transparent: true,
                opacity: 0.08,
                side: THREE.BackSide,
                depthWrite: false
            });
            mesh.add(new THREE.Mesh(outerGeom, outerMat));

            /* Inner point light for MOC */
            const light = new THREE.PointLight(pal.glow, 1.4, 160, 2);
            mesh.add(light);
        }
        return mesh;
    })
    .nodeLabel(node => {
        const typeColors = {'moc':'#ffc966','project':'#50e8c4','user':'#6a9dff','feedback':'#ff7ab5','reference':'#6ae3a0','note':'#b8a0ff'};
        const col = typeColors[node.type] || '#c0c0d8';
        const typeLabel = (node.type || 'node').toUpperCase();
        const tags = (node.tags||[]).slice(0,3).map(t => `<span style="background:rgba(180,150,255,0.15);padding:1px 6px;border-radius:6px;font-size:9px;margin-right:3px;color:#d0c5ff;">#${t}</span>`).join('');
        return `<div style="padding:10px 14px;border-radius:10px;background:rgba(10,4,40,0.94);color:#eaf5ff;font-size:12px;font-family:Inter,sans-serif;letter-spacing:0.3px;border:1px solid rgba(180,150,255,0.35);backdrop-filter:blur(8px);max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col};box-shadow:0 0 8px ${col};"></span>
              <span style="font-size:9px;letter-spacing:1.2px;color:${col};">${typeLabel}</span>
              ${node.last_reviewed ? `<span style="font-size:9px;color:#7a9cb0;margin-left:auto;">${node.last_reviewed}</span>` : ''}
            </div>
            <div style="font-weight:600;margin-bottom:4px;">${node.label || node.id}</div>
            ${tags ? `<div style="margin-top:4px;">${tags}</div>` : ''}
          </div>`;
    })
    .linkColor(link => {
        const src = rawData.nodes.find(n => n.id === (link.source.id || link.source));
        const tgt = rawData.nodes.find(n => n.id === (link.target.id || link.target));
        if (src && tgt) {
            const a = typeColor(src.type).glow;
            return '#' + a.toString(16).padStart(6, '0');
        }
        return '#b498ff';
    })
    .linkOpacity(0.32)
    .linkWidth(0.5)
    .linkDirectionalParticles(LINK_PARTICLES)
    .linkDirectionalParticleSpeed(0.004)
    .linkDirectionalParticleWidth(1.4)
    .linkDirectionalParticleColor(link => {
        const src = rawData.nodes.find(n => n.id === (link.source.id || link.source));
        if (src) {
            const c = typeColor(src.type).glow;
            return '#' + c.toString(16).padStart(6, '0');
        }
        return '#b8f0ff';
    })
    .onNodeClick(node => showDetail(node))
    .onNodeHover(node => {
        container.style.cursor = node ? 'pointer' : 'default';
        highlightNeighbors(node);
    })
    .enableNodeDrag(true)
    .warmupTicks(40)
    .cooldownTicks(100)
    .showNavInfo(false);

/* Smaller force for spacey distribution */
Graph.d3Force('charge').strength(-180);
Graph.d3Force('link').distance(70);

/* === Slow galaxy rotation (천천히 도는 은하) + damping === */
const controls = Graph.controls();
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;  /* 느리지만 인지할 수 있는 속도 */
controls.enableDamping = true;
controls.dampingFactor = 0.08;

/* === Scene post-add: star field + nebulae + fog === */
function enhanceScene() {
    const scene = Graph.scene();

    /* Fog for depth */
    scene.fog = new THREE.Fog(0x02000a, 400, 2500);

    /* === Spiral galaxy star field (나선 은하 디스크) === */
    const starCount = STAR_COUNT;
    const starGeom = new THREE.BufferGeometry();
    const positions = new Float32Array(starCount * 3);
    const sizes = new Float32Array(starCount);
    const colors = new Float32Array(starCount * 3);
    const phases = new Float32Array(starCount);  /* for twinkle */
    const palettes = [
        [1.0, 1.0, 1.0],
        [0.9, 0.95, 1.0],
        [1.0, 0.95, 0.85],
        [0.85, 0.9, 1.0],
        [1.0, 0.85, 0.75]  /* reddish */
    ];
    const ARMS = 4;
    for (let i = 0; i < starCount; i++) {
        const armIdx = i % ARMS;
        /* radial distribution: concentrated near center, sparse outward */
        const t = Math.pow(Math.random(), 0.6);
        const r = 200 + t * 2000;
        /* spiral twist */
        const armOffset = (armIdx / ARMS) * Math.PI * 2;
        const twist = r * 0.003;  /* tightness of spiral */
        const theta = armOffset + twist + (Math.random() - 0.5) * 0.5;
        /* thin disk on Z (은하 디스크는 납작) */
        const zThickness = 30 + r * 0.04;  /* thicker outward */
        const z = (Math.random() - 0.5) * zThickness * 2 * Math.exp(-r/1500);
        /* small random scatter */
        const scatter = (Math.random() - 0.5) * 80;
        positions[i*3]   = r * Math.cos(theta) + scatter;
        positions[i*3+1] = r * Math.sin(theta) + scatter;
        positions[i*3+2] = z;
        sizes[i] = Math.random() * 2.0 + 0.3;
        phases[i] = Math.random() * Math.PI * 2;
        const p = palettes[Math.floor(Math.random() * palettes.length)];
        colors[i*3] = p[0];
        colors[i*3+1] = p[1];
        colors[i*3+2] = p[2];
    }
    starGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    starGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    starGeom.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    const starMat = new THREE.PointsMaterial({
        size: 1.3,
        transparent: true,
        opacity: 0.85,
        vertexColors: true,
        sizeAttenuation: true,
        depthWrite: false
    });
    const stars = new THREE.Points(starGeom, starMat);
    scene.add(stars);
    stars.userData.phases = phases;
    stars.userData.baseColors = colors.slice();

    /* Near-field twinkling stars (bigger, closer) */
    const nearCount = NEAR_COUNT;
    const nearGeom = new THREE.BufferGeometry();
    const nearPos = new Float32Array(nearCount * 3);
    for (let i = 0; i < nearCount; i++) {
        const r = 600 + Math.random() * 600;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        nearPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
        nearPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        nearPos[i*3+2] = r * Math.cos(phi);
    }
    nearGeom.setAttribute('position', new THREE.BufferAttribute(nearPos, 3));
    const nearMat = new THREE.PointsMaterial({
        color: 0xfff4e0,
        size: 2.4,
        transparent: true,
        opacity: 0.95,
        sizeAttenuation: true,
        depthWrite: false
    });
    scene.add(new THREE.Points(nearGeom, nearMat));

    /* === Nebula clouds (large translucent spheres, BackSide so visible from inside) === */
    const nebulaData = [
        { color: 0x4b1080, opacity: 0.12, radius: 900, pos: [ -800,  500,  -400] },
        { color: 0xd82b91, opacity: 0.09, radius: 800, pos: [  900, -300,  -500] },
        { color: 0x1a8fb0, opacity: 0.10, radius: 1000, pos: [   0,  600,   900] },
        { color: 0x8040ff, opacity: 0.08, radius: 700, pos: [ -500, -600,   800] },
        { color: 0xff6a00, opacity: 0.06, radius: 600, pos: [  700,  700,   300] }
    ];
    nebulaData.forEach((n, i) => {
        const geom = new THREE.SphereGeometry(n.radius, 32, 24);
        const mat = new THREE.MeshBasicMaterial({
            color: n.color,
            transparent: true,
            opacity: n.opacity,
            side: THREE.BackSide,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const nebula = new THREE.Mesh(geom, mat);
        nebula.position.set(n.pos[0], n.pos[1], n.pos[2]);
        nebula.userData.isNebula = true;
        nebula.userData.baseOpacity = n.opacity;
        nebula.userData.phase = i * 1.3;  /* 각기 다른 타이밍 */
        scene.add(nebula);
    });

    /* === Galactic core — subtle centerpiece (은하 중심, 밝기 축소) === */
    const coreGeom = new THREE.SphereGeometry(30, 32, 32);
    const coreMat = new THREE.MeshBasicMaterial({
        color: 0xfff0c0,
        transparent: true,
        opacity: 0.18,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    const galacticCore = new THREE.Mesh(coreGeom, coreMat);
    galacticCore.renderOrder = -1;  /* render before nodes */
    scene.add(galacticCore);
    /* outer halo of core (very soft) */
    const coreHaloGeom = new THREE.SphereGeometry(120, 32, 32);
    const coreHaloMat = new THREE.MeshBasicMaterial({
        color: 0xffd080,
        transparent: true,
        opacity: 0.04,
        blending: THREE.AdditiveBlending,
        side: THREE.BackSide,
        depthWrite: false
    });
    const coreHalo = new THREE.Mesh(coreHaloGeom, coreHaloMat);
    coreHalo.renderOrder = -1;
    scene.add(coreHalo);

    /* === Ambient + directional lights (to lift metalness/emissive) === */
    const ambient = new THREE.AmbientLight(0xc0b8ff, 0.35);
    scene.add(ambient);
    const dir = new THREE.DirectionalLight(0xfff0e0, 0.55);
    dir.position.set(400, 500, 400);
    scene.add(dir);
    const fillLight = new THREE.DirectionalLight(0x6af0ff, 0.3);
    fillLight.position.set(-400, -300, -400);
    scene.add(fillLight);

    /* === Cluster zones for MOC (소속 노드 주변에 은은한 색 영역) === */
    const mocNodes = rawData.nodes.filter(n => n.type === 'moc');
    const clusterZones = [];
    mocNodes.forEach(m => {
        const pal = typeColor(m.type);
        const geom = new THREE.SphereGeometry(120, 16, 16);
        const mat = new THREE.MeshBasicMaterial({
            color: pal.core,
            transparent: true,
            opacity: 0.045,
            side: THREE.BackSide,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        const zone = new THREE.Mesh(geom, mat);
        zone.userData.mocId = m.id;
        zone.renderOrder = -2;
        scene.add(zone);
        clusterZones.push(zone);
    });

    /* === Comet pool (gets reused) === */
    const cometPool = [];
    const COMET_COUNT = IS_MOBILE ? 2 : 4;
    for (let i = 0; i < COMET_COUNT; i++) {
        const pts = 40;
        const geom = new THREE.BufferGeometry();
        const pos = new Float32Array(pts * 3);
        const col = new Float32Array(pts * 3);
        geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geom.setAttribute('color', new THREE.BufferAttribute(col, 3));
        const mat = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const line = new THREE.Line(geom, mat);
        line.userData.active = false;
        line.userData.nextSpawn = 3 + Math.random() * 15;
        line.userData.elapsed = 0;
        scene.add(line);
        cometPool.push(line);
    }
    function spawnComet(comet) {
        const startR = 1800;
        const startTheta = Math.random() * Math.PI * 2;
        const startPhi = (Math.random() - 0.5) * Math.PI;
        const sx = startR * Math.cos(startPhi) * Math.cos(startTheta);
        const sy = startR * Math.cos(startPhi) * Math.sin(startTheta);
        const sz = startR * Math.sin(startPhi);
        /* direction toward center-ish with random offset */
        const dx = -sx + (Math.random() - 0.5) * 1000;
        const dy = -sy + (Math.random() - 0.5) * 1000;
        const dz = -sz + (Math.random() - 0.5) * 600;
        const len = Math.hypot(dx, dy, dz);
        comet.userData.ox = sx; comet.userData.oy = sy; comet.userData.oz = sz;
        comet.userData.dx = dx/len; comet.userData.dy = dy/len; comet.userData.dz = dz/len;
        comet.userData.speed = 400 + Math.random() * 600;
        comet.userData.active = true;
        comet.userData.elapsed = 0;
        comet.userData.life = 2.5 + Math.random() * 2;
        const hue = Math.random() * 0.15 + 0.55;  /* blue-cyan-violet */
        const r = 0.7 + Math.random() * 0.3;
        const g = 0.85;
        const b = 1.0;
        const posArr = comet.geometry.attributes.position.array;
        const colArr = comet.geometry.attributes.color.array;
        const pts = posArr.length / 3;
        for (let i = 0; i < pts; i++) {
            const fade = i / pts;
            colArr[i*3] = r;
            colArr[i*3+1] = g;
            colArr[i*3+2] = b;
            /* trail behind start */
            posArr[i*3]   = sx - comet.userData.dx * i * 12;
            posArr[i*3+1] = sy - comet.userData.dy * i * 12;
            posArr[i*3+2] = sz - comet.userData.dz * i * 12;
        }
        comet.geometry.attributes.position.needsUpdate = true;
        comet.geometry.attributes.color.needsUpdate = true;
        comet.material.opacity = 1;
    }

    /* === Slow rotation of starfield + nebula breathing (은하 호흡) === */
    const clock = new THREE.Clock();
    let lastTime = 0;
    const stagedOrigColors = stars.userData.baseColors;
    const twinklePhases = stars.userData.phases;

    function animate() {
        const t = clock.getElapsedTime();
        const dt = t - lastTime;
        lastTime = t;

        /* star field slow rotation (disk plane) */
        stars.rotation.z = t * 0.01;
        stars.rotation.x = Math.PI/2.8;  /* tilt for disk perspective */

        /* star twinkle — vary alpha per frame (subtle) */
        /* using material.opacity global pulse as fallback (cheap) */
        starMat.opacity = 0.7 + 0.15 * Math.sin(t * 1.2);

        /* nebula breathing */
        scene.traverse(obj => {
            if (obj.userData.isNebula) {
                obj.material.opacity = obj.userData.baseOpacity * (0.75 + 0.25 * Math.sin(t * 0.3 + obj.userData.phase));
                const s = 1 + 0.05 * Math.sin(t * 0.25 + obj.userData.phase);
                obj.scale.set(s, s, s);
            }
        });

        /* galactic core very subtle pulse */
        galacticCore.material.opacity = 0.15 + 0.06 * Math.sin(t * 0.6);
        galacticCore.scale.setScalar(1 + 0.06 * Math.sin(t * 0.55));

        /* cluster zones follow their MOC node position */
        clusterZones.forEach(zone => {
            const moc = rawData.nodes.find(n => n.id === zone.userData.mocId);
            if (moc && moc.x !== undefined) {
                zone.position.set(moc.x, moc.y, moc.z);
                zone.material.opacity = 0.04 + 0.02 * Math.sin(t * 0.4 + (zone.userData.mocId.length % 10));
            }
        });

        /* comets */
        cometPool.forEach(comet => {
            if (!comet.userData.active) {
                comet.userData.elapsed += dt;
                if (comet.userData.elapsed >= comet.userData.nextSpawn) {
                    spawnComet(comet);
                }
            } else {
                comet.userData.elapsed += dt;
                const life = comet.userData.life;
                if (comet.userData.elapsed >= life) {
                    comet.userData.active = false;
                    comet.userData.elapsed = 0;
                    comet.userData.nextSpawn = 5 + Math.random() * 18;
                    comet.material.opacity = 0;
                } else {
                    const step = comet.userData.speed * dt;
                    const posArr = comet.geometry.attributes.position.array;
                    const pts = posArr.length / 3;
                    for (let i = 0; i < pts; i++) {
                        posArr[i*3]   += comet.userData.dx * step * (1 - i/pts * 0.3);
                        posArr[i*3+1] += comet.userData.dy * step * (1 - i/pts * 0.3);
                        posArr[i*3+2] += comet.userData.dz * step * (1 - i/pts * 0.3);
                    }
                    comet.geometry.attributes.position.needsUpdate = true;
                    /* fade in/out */
                    const progress = comet.userData.elapsed / life;
                    comet.material.opacity = Math.sin(progress * Math.PI) * 0.9;
                }
            }
        });

        requestAnimationFrame(animate);
    }
    animate();
}

setTimeout(enhanceScene, 100);

/* === Camera initial position === */
Graph.cameraPosition({ x: 0, y: 0, z: 600 }, { x: 0, y: 0, z: 0 }, 0);

/* === Stats === */
document.getElementById('node-count').textContent = rawData.nodes.length;
document.getElementById('link-count').textContent = rawData.links.length;

/* === Hover highlight (연결 경로 강조) === */
let highlightedId = null;
function highlightNeighbors(node) {
    if (!node) {
        highlightedId = null;
        Graph.nodeVisibility(true).linkVisibility(true);
        Graph.nodeOpacity(1).linkOpacity(0.32);
        return;
    }
    highlightedId = node.id;
    const nbSet = neighbors.get(node.id) || new Set();
    /* Use linkWidth / linkColor callbacks that read highlightedId to filter */
    Graph.refresh();
}
/* Override link visibility/color based on highlight state */
Graph.linkOpacity(link => {
    if (!highlightedId) return 0.32;
    const s = link.source.id || link.source;
    const t = link.target.id || link.target;
    if (s === highlightedId || t === highlightedId) return 0.9;
    return 0.05;
});
Graph.linkWidth(link => {
    if (!highlightedId) return 0.5;
    const s = link.source.id || link.source;
    const t = link.target.id || link.target;
    if (s === highlightedId || t === highlightedId) return 2.0;
    return 0.3;
});

/* === Detail panel === */
const panel = document.getElementById('detail-panel');
function showDetail(node) {
    document.getElementById('detail-title').textContent = node.label || node.id;
    const typeEl = document.getElementById('detail-type');
    const pal = typeColor(node.type);
    typeEl.textContent = (node.type || 'node').toUpperCase();
    typeEl.style.background = 'linear-gradient(90deg, #' + pal.core.toString(16).padStart(6, '0') + ', #' + pal.glow.toString(16).padStart(6, '0') + ')';
    typeEl.style.color = '#fff';
    document.getElementById('detail-desc').textContent = node.description || '—';
    document.getElementById('detail-status').textContent = node.status || '—';
    document.getElementById('detail-priority').textContent = node.priority || '—';
    document.getElementById('detail-date').textContent = node.last_reviewed || '—';
    const tagsEl = document.getElementById('detail-tags');
    tagsEl.innerHTML = '';
    if (node.tags && node.tags.length) {
        node.tags.slice(0, 10).forEach(t => {
            const s = document.createElement('span');
            s.className = 'tag-pill';
            s.textContent = '#' + t;
            tagsEl.appendChild(s);
        });
    }
    panel.classList.add('open');

    /* Focus camera on node */
    const distance = 200;
    const distRatio = 1 + distance / Math.hypot(node.x || 1, node.y || 1, node.z || 1);
    Graph.cameraPosition({
        x: (node.x || 0) * distRatio,
        y: (node.y || 0) * distRatio,
        z: (node.z || 0) * distRatio
    }, node, 800);
}
document.getElementById('close-btn').addEventListener('click', () => {
    panel.classList.remove('open');
});

/* === Filter (type + MOC cluster) === */
function applyFilter(filterKey) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`[data-filter="${filterKey}"]`);
    if (btn) btn.classList.add('active');

    if (filterKey === 'all') {
        Graph.graphData(rawData);
        return;
    }
    if (filterKey.startsWith('type:')) {
        const type = filterKey.slice(5);
        const filtered = {
            nodes: rawData.nodes.filter(n => n.type === type || n.type === 'moc'),
            links: rawData.links.filter(l => {
                const s = nodeById.get(l.source.id || l.source);
                const t = nodeById.get(l.target.id || l.target);
                if (!s || !t) return false;
                return (s.type === type || s.type === 'moc') && (t.type === type || t.type === 'moc');
            })
        };
        Graph.graphData(filtered);
        return;
    }
    if (filterKey.startsWith('moc:')) {
        const mocId = filterKey.slice(4);
        /* Include MOC itself + all nodes connected to it (direct neighbors) */
        const includedIds = new Set([mocId]);
        const nb = neighbors.get(mocId) || new Set();
        nb.forEach(id => includedIds.add(id));
        const filtered = {
            nodes: rawData.nodes.filter(n => includedIds.has(n.id)),
            links: rawData.links.filter(l => {
                const s = l.source.id || l.source;
                const t = l.target.id || l.target;
                return includedIds.has(s) && includedIds.has(t);
            })
        };
        Graph.graphData(filtered);
    }
}

document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
});

/* MOC dropdown */
const mocMenu = document.getElementById('moc-menu');
const mocBtn = document.getElementById('moc-filter-btn');
const mocList = rawData.nodes.filter(n => n.type === 'moc');
mocList.forEach(m => {
    const b = document.createElement('button');
    b.className = 'filter-btn';
    b.style.margin = '3px';
    b.textContent = m.label || m.id;
    b.addEventListener('click', () => {
        mocMenu.style.display = 'none';
        applyFilter('moc:' + m.id);
    });
    mocMenu.appendChild(b);
});
mocBtn.addEventListener('click', () => {
    mocMenu.style.display = (mocMenu.style.display === 'flex') ? 'none' : 'flex';
    mocMenu.style.flexWrap = 'wrap';
    mocMenu.style.gap = '4px';
});

/* === Search === */
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
function runSearch(q) {
    if (!q || q.length < 1) {
        searchResults.classList.remove('show');
        searchResults.innerHTML = '';
        return;
    }
    const lower = q.toLowerCase();
    const matches = rawData.nodes.filter(n => {
        if ((n.label || n.id).toLowerCase().includes(lower)) return true;
        if (n.description && n.description.toLowerCase().includes(lower)) return true;
        if (n.tags && n.tags.some(t => t.toLowerCase().includes(lower))) return true;
        return false;
    }).slice(0, 12);
    if (matches.length === 0) {
        searchResults.innerHTML = '<div class="search-result-item" style="color:#7a9cb0;">검색 결과 없음</div>';
    } else {
        const typeColors = {'moc':'#ffc966','project':'#50e8c4','user':'#6a9dff','feedback':'#ff7ab5','reference':'#6ae3a0','note':'#b8a0ff'};
        searchResults.innerHTML = matches.map(m => {
            const col = typeColors[m.type] || '#c0c0d8';
            return `<div class="search-result-item" data-node-id="${m.id}">
                      <span class="t-pill" style="background:${col}33;color:${col};">${(m.type||'').toUpperCase()}</span>
                      ${m.label || m.id}
                    </div>`;
        }).join('');
    }
    searchResults.classList.add('show');
}
searchInput.addEventListener('input', e => runSearch(e.target.value));
searchResults.addEventListener('click', e => {
    const item = e.target.closest('.search-result-item');
    if (!item || !item.dataset.nodeId) return;
    const node = nodeById.get(item.dataset.nodeId);
    if (node) {
        searchResults.classList.remove('show');
        searchInput.value = '';
        /* focus camera */
        const distance = 200;
        const distRatio = 1 + distance / Math.hypot(node.x || 1, node.y || 1, node.z || 1);
        Graph.cameraPosition({
            x: (node.x || 0) * distRatio,
            y: (node.y || 0) * distRatio,
            z: (node.z || 0) * distRatio
        }, node, 1000);
        setTimeout(() => showDetail(node), 1050);
    }
});
document.addEventListener('click', e => {
    if (!e.target.closest('#search-wrap')) {
        searchResults.classList.remove('show');
    }
});

/* === Resize === */
window.addEventListener('resize', () => {
    Graph.width(container.clientWidth).height(container.clientHeight);
});
